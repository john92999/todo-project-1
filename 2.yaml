- name: Install prerequisites
  become: yes
  hosts: all
  vars:
    applications1:
      - openjdk-11-jdk
      - curl
      - maven
      - openjdk-21-jdk
      - fontconfig
    applications2:
      - mongodb-org
      - nodejs
      - jenkins
  tasks:
    - name: Install the application which are present
      include_tasks: install_apps.yaml
      vars:
        packages: "{{ applications1 }}"
    - name: install the gpg for mongo and nodejs
      ansible.builtin.shell: |
        curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor
      args:
        creates: /usr/share/keyrings/mongodb-server-7.0.gpg
    - name: Add MongoDB repository
      ansible.builtin.shell: |
        echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | tee /etc/apt/sources.list.d/mongodb-org-7.0.list
      args:
        creates: /etc/apt/sources.list.d/mongodb-org-7.0.list
    - name: Install and start jenkins
      ansible.builtin.shell: |
        sudo gpg --export 7198F4B714ABFC68 | sudo tee /usr/share/keyrings/jenkins-keyring.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/" | sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null
    - name: Add NodeJS 16 repository
      ansible.builtin.shell: curl -fsSL https://deb.nodesource.com/setup_16.x | bash -
      notify: update cache
    - name: update_cache immediatley
      ansible.builtin.meta: flush_handlers
    - name: Install the application which are present
      include_tasks: install_apps.yaml
      vars:
        packages: "{{ applications2 }}"
    - name: Start MongoDB
      ansible.builtin.systemd:
        name: mongod
        state: started
        enabled: yes
    - name: Create MongoDB user and collection
      ansible.builtin.shell: |
        mongosh --eval '
          use admin;
          db.createUser({ user: "root", pwd: "password", roles: [{ role: "root", db: "admin" }] });
          use todo;
          db.createCollection("todos");
        '
    - name: change mongo configuration
      ansible.builtin.blockinfile:
        path: /etc/mongod.conf
        block: |
          security:
            authorization: enabled
    - name: Change Jenkins port
      ansible.builtin.replace:
        path: /usr/lib/systemd/system/jenkins.service
        regexp: 'Environment="JENKINS_PORT=8080"'
        replace: 'Environment="JENKINS_PORT=9095"'
    - name: change Jenkins port
      ansible.built.lineinfile:
        path: /etc/default/jenkins
        regexp: "^HTTP_PORT="
        line: "HTTP_PORT=9095"
    - name: Reload the system
      ansible.builtin.systemd:
        daemon_reload: yes
    - name: Restart applications
      ansible.builtin.systemd:
        name:
          - mongod
          - jenkins
        state: restarted
        enabled: yes
  handlers:
    - name: update cache
      ansible.builtin.apt:
        update_cache: yes
