- name: Install all the required files for the Application to run
  become: yes
  hosts: all
  vars:
    applications:
      - curl
      - git
      - openjdk-11-jdk
      - maven
  tasks:
    - name: Install the apps which can be installed through
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update_cache: yes
      loop: "{{ applications }}"
    - name: key repositories for Mongo and Node
      ansible.builtin.shell: |
        curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor
      args:
        creates: /usr/share/keyrings/mongodb-server-7.0.gpg
      notify: update cache
    - name: Add MongoDB repository
      ansible.builtin.shell: |
        echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | tee /etc/apt/sources.list.d/mongodb-org-7.0.list
      args:
        creates: /etc/apt/sources.list.d/mongodb-org-7.0.list
      notify: update cache
    - name: Add NodeJS 16 repository
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/setup_16.x | bash -
      notify: update cache
    - name: Flushing handler so to install next applications
      ansible.builtin.meta: flush_handlers
    - name: Now need to install some more apps
      ansible.builtin.apt:
        name:
          - mongodb-org
          - nodejs
        state: present
        update_cache: true
    - name: Start and enable the services
      ansible.builtin.systemd_service:
        name: mongod
        enabled: true
    - name: Create MongoDB root user
      ansible.builtin.shell: |
        mongosh --eval '
          db = db.getSiblingDB("admin");
          db.createUser({
            user: "root",
            pwd: "password",
            roles: [{ role: "root", db: "admin" }]
          });
        '
      args:
        creates: /root/.mongo_user_created

    - name: Mark mongo user as created
      ansible.builtin.file:
        path: /root/.mongo_user_created
        state: touch

    - name: Create todo database and collection
      ansible.builtin.shell: |
        mongosh --eval '
          db = db.getSiblingDB("todo");
          db.createCollection("todos");
        '

    - name: Enable MongoDB authentication in config
      ansible.builtin.blockinfile:
        path: /etc/mongod.conf
        block: |
          security:
            authorization: enabled

    - name: Restart MongoDB
      ansible.builtin.systemd:
        name: mongod
        state: restarted
        enabled: yes

    - name: Verify MongoDB is running
      ansible.builtin.systemd:
        name: mongod
        state: started
  handlers:
    - name: update cache
      ansible.builtin.apt:
        update_cache: true
