# MongoDB — will be overridden by env var injected from Kubernetes Secret
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://root:password@localhost:27017/todo?authSource=admin}

# Expose health, prometheus, and metrics endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Tag all metrics with the application name (shows in Grafana)
management.metrics.tags.application=todo-api

# Separate health endpoint path (used by k8s probes)
# GET /actuator/health   → liveness probe
# GET /actuator/health/readiness → readiness probe
